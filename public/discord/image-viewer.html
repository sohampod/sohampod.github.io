<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Viewer</title>
    <link rel="icon" type="image/svg+xml" href="/wip/favicon.svg" />
    <style>
        body {
            margin: 0;
            background-color: #0e0e0e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: auto;
        }

        img {
            max-width: 100vw;
            height: auto;
            object-fit: contain;
            cursor: zoom-in;
            display: block;
        }

        .zoomed {
            cursor: zoom-out;
            max-width: none;
            width: auto;
            position: absolute;
            top: 0;
            left: 0;
            margin: 0;
        }
    </style>
</head>

<body>
    <img id="viewer-image" src="" alt="Full Resolution Image" />
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const imgSrc = urlParams.get('src');
        const imgEl = document.getElementById('viewer-image');

        if (imgSrc) {
            imgEl.src = decodeURIComponent(imgSrc);
        } else {
            imgEl.alt = 'Image source not provided';
        }

        let isZoomed = false;

        imgEl.addEventListener('click', function (e) {
            if (!isZoomed) {
                // Determine click position ratio relative to the currently visible dimensions
                const rect = imgEl.getBoundingClientRect();
                const ratioX = (e.clientX - rect.left) / rect.width;
                const ratioY = (e.clientY - rect.top) / rect.height;

                // Zoom in
                isZoomed = true;
                imgEl.classList.add('zoomed');

                // Calculate target scroll positions to center on where the user clicked
                requestAnimationFrame(() => {
                    const targetScrollX = (imgEl.width * ratioX) - (window.innerWidth / 2);
                    const targetScrollY = (imgEl.height * ratioY) - (window.innerHeight / 2);
                    window.scrollTo(targetScrollX, targetScrollY);
                });
            } else {
                // Zoom out
                isZoomed = false;
                imgEl.classList.remove('zoomed');
            }
        });
    </script>
</body>

</html>
