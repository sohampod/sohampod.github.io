<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Viewer</title>
    <link rel="icon" type="image/svg+xml" href="/wip/favicon.svg" />
    <style>
        body {
            margin: 0;
            background-color: #0e0e0e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: auto;
        }
        img {
            max-width: 100vw;
            height: auto;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <img id="viewer-image" src="" alt="Full Resolution Image" />
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const imgSrc = urlParams.get('src');
        if (imgSrc) {
            document.getElementById('viewer-image').src = decodeURIComponent(imgSrc);
        } else {
            document.getElementById('viewer-image').alt = 'Image source not provided';
        }
    </script>
</body>
</html>
